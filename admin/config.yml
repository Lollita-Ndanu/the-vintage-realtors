

backend:
  name: github
  repo: Lollita-Ndanu/the-vintage-realtors
  branch: main
  site_domain: the-vintage-realtors.vercel.app # Add this line!

  
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "properties"
    label: "Properties"
    folder: "admin/properties"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Bedrooms", name: "bedrooms", widget: "number" }
      - { label: "Bathrooms", name: "bathrooms", widget: "number" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["For Sale", "For Rent", "Sold"]
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Main Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
