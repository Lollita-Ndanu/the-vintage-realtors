<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Property — The Vintage Realtors</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="property-page">
    <nav>
        <a href="index.html" class="logo-container">
            <img src="images/logo.avif" alt="The Vintage Realtors logo" class="logo-img">
        </a>
        <div class="site-title"><span>THE VINTAGE REALTORS</span></div>
        <button class="hamburger" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </nav>

    <main style="max-width:1100px;margin:60px auto;padding:24px;">
        <div id="propertyDetail" class="property-detail">Loading…</div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-logo"><img src="images/FOOTER%20LOGO.avif" alt="Footer logo"></div>
            <div class="footer-about"><h3>The Vintage Realtors</h3><p>If you build it, we will list it.</p><p>Nairobi, Kenya</p></div>
            <div class="footer-contact"><h4>Contact</h4><p>Email: <a href="mailto:sales@vintagerealtors.co.ke">sales@vintagerealtors.co.ke</a></p><p>Phone: <a href="tel:+254722865306">+254722865306</a></p></div>
        </div>
    </footer>

    <script>
    // Load a single property from /properties/<slug>.md and render it
    (function(){
        function qs(key){ return new URLSearchParams(location.search).get(key); }
        const slug = qs('slug');
        const container = document.getElementById('propertyDetail');
        if(!slug){ container.innerHTML = '<p>Property not specified. <a href="properties.html">View other properties</a></p>'; return; }

        fetch('/properties/' + encodeURIComponent(slug) + '.md').then(r => {
            if(!r.ok) throw new Error('Not found');
            return r.text();
        }).then(md => {
            const fmMatch = md.match(/^---\s*([\s\S]*?)\s*---/);
            let fm = {};
            let body = md;
            if(fmMatch){
                fmMatch[1].split(/\r?\n/).forEach(line => {
                    const m = line.match(/^([^:]+):\s*(.*)$/);
                    if(!m) return;
                    const key = m[1].trim();
                    let val = m[2].trim().replace(/^"|"$/g,'').replace(/^'|'$/g,'');
                    if(/^[0-9]+$/.test(val)) val = parseInt(val,10);
                    fm[key] = val;
                });
                body = md.slice(fmMatch[0].length).trim();
            }

            const title = fm.title || slug.replace(/-/g,' ');
            const price = fm.price || '';
            const locationText = fm.location || '';
            const beds = fm.bedrooms || null;
            const baths = fm.bathrooms || null;
            const img = fm.image || '';
            const desc = fm.description || body || '';

            // parse gallery from frontmatter (comma-separated list) or fall back to main image
            const galleryStr = fm.gallery || '';
            const gallery = galleryStr ? galleryStr.split(',').map(s=>s.trim()).filter(Boolean) : (img ? [img] : []);

            container.innerHTML = `
                <article class="pd-card">
                    ${gallery.length ? `
                    <div class="pd-gallery">
                        <div class="pd-main"><img src="${gallery[0]}" alt="${title}" class="pd-main-img"></div>
                        ${gallery.length > 1 ? `<div class="pd-thumbs">${gallery.map((g,i)=> `<button class="thumb" data-src="${g}" data-index="${i}" aria-label="View image"><img src="${g}" alt="${title}"></button>`).join('')}</div>` : ''}
                    </div>
                    ` : ''}
                    <div class="pd-body">
                        <h1 class="pd-title">${title}</h1>
                        <div class="pd-meta"><span class="pd-price">${price}</span> · <span>${locationText}</span></div>
                        <p class="pd-desc">${desc}</p>
                        <div class="pd-specs">
                            ${beds ? `<strong>${beds} bd</strong>` : ''}
                            ${baths ? `<strong>${baths} ba</strong>` : ''}
                        </div>
                        <div class="pd-actions">
                            <a href="contact.html?property=${encodeURIComponent(slug)}" class="btn-primary">Contact about this property</a>
                            <a href="properties.html" class="btn-secondary">View other properties</a>
                        </div>
                    </div>
                </article>
            `;

            // wire up gallery interactions (thumbnails, main image click -> lightbox)
            const thumbs = container.querySelectorAll('.pd-thumbs .thumb');
            const mainImg = container.querySelector('.pd-main-img');

            // create lightbox if missing
            let lb = document.getElementById('lightbox');
            if(!lb){
                lb = document.createElement('div');
                lb.id = 'lightbox';
                lb.className = 'lightbox';
                lb.innerHTML = `
                    <button class="lb-close" aria-label="Close">&times;</button>
                    <button class="lb-prev" aria-label="Previous">‹</button>
                    <div class="lb-inner"><img src="" alt=""></div>
                    <button class="lb-next" aria-label="Next">›</button>
                `;
                document.body.appendChild(lb);
            }

            const lbInnerImg = lb.querySelector('.lb-inner img');
            const lbClose = lb.querySelector('.lb-close');
            const lbPrev = lb.querySelector('.lb-prev');
            const lbNext = lb.querySelector('.lb-next');

            let currentIndex = 0;

            function openLightbox(index){
                if(!gallery.length) return;
                currentIndex = (index + gallery.length) % gallery.length;
                lbInnerImg.src = gallery[currentIndex];
                lb.classList.add('open');
                lb.setAttribute('aria-hidden','false');
                document.body.style.overflow = 'hidden';
            }
            function closeLightbox(){ lb.classList.remove('open'); lb.setAttribute('aria-hidden','true'); document.body.style.overflow = ''; }
            function prev(){ openLightbox((currentIndex - 1 + gallery.length) % gallery.length); }
            function next(){ openLightbox((currentIndex + 1) % gallery.length); }

            if(mainImg){ mainImg.addEventListener('click', () => openLightbox(0)); }
            if(thumbs && thumbs.length){
                thumbs.forEach(t => t.addEventListener('click', (e) => {
                    const idx = parseInt(t.dataset.index,10) || 0;
                    if(mainImg) mainImg.src = t.dataset.src;
                    openLightbox(idx);
                }));
            }

            lbClose.addEventListener('click', closeLightbox);
            lbPrev.addEventListener('click', prev);
            lbNext.addEventListener('click', next);
            lb.addEventListener('click', (e) => { if(e.target === lb) closeLightbox(); });
            document.addEventListener('keydown', (e) => {
                if(!lb.classList.contains('open')) return;
                if(e.key === 'Escape') closeLightbox();
                if(e.key === 'ArrowLeft') prev();
                if(e.key === 'ArrowRight') next();
            });
        }).catch(() => {
            container.innerHTML = '<p>Property not found. <a href="properties.html">View other properties</a></p>';
        });
    })();
    </script>
</body>
</html>
